    <circle cx="148" cy="188" r="2"/><circle cx="156" cy="185" r="2"/><circle cx="164" cy="183" r="2"/>
    <circle cx="172" cy="182" r="2"/><circle cx="180" cy="184" r="2"/><circle cx="188" cy="186" r="2"/>
    <circle cx="130" cy="200" r="2"/><circle cx="138" cy="198" r="2"/><circle cx="146" cy="196" r="2"/>
    <circle cx="154" cy="195" r="2"/><circle cx="162" cy="194" r="2"/><circle cx="170" cy="196" r="2"/>
