  <!-- ============================================ -->
  <!-- LAYER 2: Network Connection Lines            -->
  <!-- ============================================ -->
  <g opacity="0.12" stroke="white" stroke-width="0.8" fill="none">
    <!-- Seoul hub connections -->
    <path d="M570,195 Q480,140 400,175" stroke-dasharray="4,4"/>
    <path d="M570,195 Q520,250 560,340"/>
    <path d="M570,195 Q400,120 170,190" stroke-dasharray="4,4"/>
    <!-- Frankfurt hub -->
    <path d="M410,180 Q350,250 410,280"/>
    <path d="M410,180 Q300,160 170,190" stroke-dasharray="4,4"/>
    <!-- Dubai connection -->
    <path d="M460,220 Q440,270 420,280"/>
    <path d="M460,220 Q510,200 570,195"/>
  </g>

  <!-- ============================================ -->
  <!-- LAYER 2.5: Hub Nodes with Glow               -->
  <!-- ============================================ -->
  <g opacity="0.25">
    <!-- Seoul (KR) -->
    <circle cx="570" cy="195" r="4" fill="#7dd3fc"/><circle cx="570" cy="195" r="8" fill="#7dd3fc" opacity="0.3"/>
    <text x="570" y="215" text-anchor="middle" fill="white" font-size="8" font-family="Inter,sans-serif" opacity="0.7">KR</text>
    <!-- Frankfurt (DE) -->
    <circle cx="410" cy="180" r="3.5" fill="#7dd3fc"/><circle cx="410" cy="180" r="7" fill="#7dd3fc" opacity="0.25"/>
    <text x="410" y="199" text-anchor="middle" fill="white" font-size="8" font-family="Inter,sans-serif" opacity="0.7">DE</text>
    <!-- Washington (US) -->
    <circle cx="170" cy="190" r="3.5" fill="#7dd3fc"/><circle cx="170" cy="190" r="7" fill="#7dd3fc" opacity="0.25"/>
    <text x="170" y="209" text-anchor="middle" fill="white" font-size="8" font-family="Inter,sans-serif" opacity="0.7">US</text>
    <!-- Dubai (AE) -->
    <circle cx="460" cy="220" r="3" fill="#7dd3fc"/><circle cx="460" cy="220" r="6" fill="#7dd3fc" opacity="0.2"/>
    <text x="460" y="237" text-anchor="middle" fill="white" font-size="8" font-family="Inter,sans-serif" opacity="0.7">AE</text>
    <!-- Sydney (AU) -->
    <circle cx="570" cy="350" r="3" fill="#7dd3fc"/><circle cx="570" cy="350" r="6" fill="#7dd3fc" opacity="0.2"/>
    <text x="570" y="367" text-anchor="middle" fill="white" font-size="8" font-family="Inter,sans-serif" opacity="0.7">AU</text>
  </g>

  <!-- ============================================ -->
  <!-- LAYER 3: RFID Chip Symbol (right side)       -->
  <!-- ============================================ -->
  <g transform="translate(620, 120)" opacity="0.12" stroke="white" fill="none">
    <!-- Chip body -->
    <rect x="0" y="0" width="60" height="48" rx="5" stroke-width="1.5"/>
    <!-- Chip contacts -->
    <rect x="8" y="8" width="18" height="14" rx="2" stroke-width="1"/>
    <rect x="8" y="26" width="18" height="14" rx="2" stroke-width="1"/>
    <rect x="34" y="8" width="18" height="14" rx="2" stroke-width="1"/>
    <rect x="34" y="26" width="18" height="14" rx="2" stroke-width="1"/>
    <!-- Antenna coils -->
    <rect x="-12" y="-12" width="84" height="72" rx="10" stroke-width="0.8"/>
    <rect x="-20" y="-20" width="100" height="88" rx="14" stroke-width="0.6"/>
    <rect x="-28" y="-28" width="116" height="104" rx="18" stroke-width="0.4"/>
  </g>

  <!-- ============================================ -->
  <!-- LAYER 4: Immigration Stamps                  -->
  <!-- ============================================ -->
  <!-- Stamp 1: Circular ARRIVED stamp -->
  <g transform="translate(600, 420) rotate(-15)" opacity="0.10">
    <circle cx="0" cy="0" r="45" stroke="white" stroke-width="2" fill="none"/>
    <circle cx="0" cy="0" r="40" stroke="white" stroke-width="0.8" fill="none"/>
    <text x="0" y="-18" text-anchor="middle" fill="white" font-size="8" font-family="Inter,sans-serif" font-weight="700" letter-spacing="4">IMMIGRATION</text>
    <line x1="-32" y1="-10" x2="32" y2="-10" stroke="white" stroke-width="0.5"/>
    <text x="0" y="2" text-anchor="middle" fill="white" font-size="11" font-family="Inter,sans-serif" font-weight="700">ARRIVED</text>
    <line x1="-32" y1="10" x2="32" y2="10" stroke="white" stroke-width="0.5"/>
    <text x="0" y="24" text-anchor="middle" fill="white" font-size="7" font-family="Inter,sans-serif">2026.03.09</text>
  </g>

  <!-- Stamp 2: Rectangular DEPARTED stamp -->
  <g transform="translate(100, 480) rotate(8)" opacity="0.09">
    <rect x="-50" y="-25" width="100" height="50" rx="3" stroke="white" stroke-width="2" fill="none"/>
    <rect x="-46" y="-21" width="92" height="42" rx="2" stroke="white" stroke-width="0.5" fill="none"/>
    <text x="0" y="-6" text-anchor="middle" fill="white" font-size="10" font-family="Inter,sans-serif" font-weight="700" letter-spacing="2">DEPARTED</text>
    <text x="0" y="10" text-anchor="middle" fill="white" font-size="7" font-family="Inter,sans-serif">INCHEON  ICN</text>
  </g>

  <!-- Stamp 3: Hexagonal VERIFIED stamp -->
  <g transform="translate(380, 520) rotate(-5)" opacity="0.08">
    <polygon points="0,-40 35,-20 35,20 0,40 -35,20 -35,-20" stroke="white" stroke-width="1.5" fill="none"/>
    <text x="0" y="-8" text-anchor="middle" fill="white" font-size="7" font-family="Inter,sans-serif" font-weight="600" letter-spacing="2">PASSPORT</text>
    <text x="0" y="8" text-anchor="middle" fill="white" font-size="9" font-family="Inter,sans-serif" font-weight="700">VERIFIED</text>
    <text x="0" y="22" text-anchor="middle" fill="white" font-size="6" font-family="Inter,sans-serif">FastSPKD</text>
  </g>

  <!-- ============================================ -->
  <!-- LAYER 5: Passport Page Corner (bottom-right) -->
  <!-- ============================================ -->
  <g transform="translate(420, 580) rotate(-6)" opacity="0.10">
    <!-- Passport page outline -->
    <rect x="0" y="0" width="320" height="200" rx="8" stroke="white" stroke-width="1" fill="none"/>
    <!-- Photo area -->
    <rect x="15" y="20" width="70" height="90" rx="3" stroke="white" stroke-width="0.8" fill="none"/>
    <text x="50" y="70" text-anchor="middle" fill="white" font-size="8" font-family="Inter,sans-serif">PHOTO</text>
    <!-- Data fields -->
    <line x1="100" y1="30" x2="300" y2="30" stroke="white" stroke-width="0.5"/>
    <line x1="100" y1="48" x2="300" y2="48" stroke="white" stroke-width="0.5"/>
    <line x1="100" y1="66" x2="260" y2="66" stroke="white" stroke-width="0.5"/>
    <line x1="100" y1="84" x2="280" y2="84" stroke="white" stroke-width="0.5"/>
    <line x1="100" y1="102" x2="240" y2="102" stroke="white" stroke-width="0.5"/>
    <text x="100" y="27" fill="white" font-size="5" font-family="Inter,sans-serif" opacity="0.8">SURNAME / NOM</text>
    <text x="100" y="45" fill="white" font-size="5" font-family="Inter,sans-serif" opacity="0.8">GIVEN NAMES / PRENOMS</text>
    <text x="100" y="63" fill="white" font-size="5" font-family="Inter,sans-serif" opacity="0.8">NATIONALITY / NATIONALITE</text>
    <text x="100" y="81" fill="white" font-size="5" font-family="Inter,sans-serif" opacity="0.8">DATE OF BIRTH / DATE DE NAISSANCE</text>
    <text x="100" y="99" fill="white" font-size="5" font-family="Inter,sans-serif" opacity="0.8">PASSPORT NO.</text>
  </g>

  <!-- ============================================ -->
  <!-- LAYER 6: MRZ Lines (bottom)                  -->
  <!-- ============================================ -->
  <g opacity="0.09">
    <text x="20" y="820" fill="white" font-size="11" font-family="'Courier New',monospace" letter-spacing="2">P&lt;KORKIM&lt;&lt;MINJUN&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;</text>
    <text x="20" y="838" fill="white" font-size="11" font-family="'Courier New',monospace" letter-spacing="2">M731029382KOR9201154M2803096&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;04</text>
    <text x="20" y="862" fill="white" font-size="11" font-family="'Courier New',monospace" letter-spacing="2">P&lt;USASMITH&lt;&lt;JOHN&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;</text>
    <text x="20" y="880" fill="white" font-size="11" font-family="'Courier New',monospace" letter-spacing="2">5023681947USA8805201M3107283&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;08</text>
  </g>
</svg>
