# =============================================================================
# ICAO Local PKD - ARM64 Deployment Docker Compose
# Target: Luckfox Omni 3576 (aarch64)
# =============================================================================
#
# This configuration is for ARM64 deployment with:
# - Native OpenLDAP (systemd service on host)
# - Docker containers: PostgreSQL + App Services
#
# LDAP Strategy (v2.0.1+):
#   - Applications use direct connections to OpenLDAP servers
#   - Application-level load balancing (no HAProxy)
#
# Usage:
#   docker compose -f docker-compose.arm64.yaml up -d
#
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Frontend (React.js)
  # ---------------------------------------------------------------------------
  frontend:
    image: icao-local-pkd-frontend:arm64  # CI: pkd-frontend-arm64.tar.gz
    container_name: icao-local-pkd-frontend
    platform: linux/arm64
    ports:
      - "3000:80"
    environment:
      - TZ=Asia/Seoul
    depends_on:
      - pkd-management
      - pa-service
    networks:
      - pkd-network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # PKD Management Service (File Upload, Parsing, Certificate Validation)
  # ---------------------------------------------------------------------------
  pkd-management:
    image: icao-local-management:arm64  # CI: pkd-management-arm64.tar.gz
    container_name: icao-local-pkd-management
    platform: linux/arm64
    ports:
      - "8081:8081"
    environment:
      - TZ=Asia/Seoul
      - SERVICE_NAME=pkd-management
      - SERVER_PORT=8081
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=localpkd
      - DB_USER=pkd
      - DB_PASSWORD=${DB_PASSWORD}
      # Native LDAP on host (accessed via host.docker.internal or host IP)
      - LDAP_HOST=192.168.100.10
      - LDAP_PORT=389
      - LDAP_WRITE_HOST=192.168.100.10
      - LDAP_WRITE_PORT=389
      - LDAP_BIND_DN=cn=admin,dc=ldap,dc=smartcoreinc,dc=com
      - LDAP_BIND_PASSWORD=${LDAP_BIND_PASSWORD}
      - LDAP_BASE_DN=dc=pkd,dc=ldap,dc=smartcoreinc,dc=com
      - TRUST_ANCHOR_PATH=/app/data/cert/UN_CSCA_2.pem
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./data/pkd-logs:/app/logs
      - ./data/pkd-uploads:/app/uploads
      - ./data/cert:/app/data/cert:ro
    networks:
      - pkd-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ---------------------------------------------------------------------------
  # PA Service (Passive Authentication Verification)
  # ---------------------------------------------------------------------------
  pa-service:
    image: icao-local-pa:arm64  # CI: pkd-pa-arm64.tar.gz
    container_name: icao-local-pkd-pa-service
    platform: linux/arm64
    ports:
      - "8082:8082"
    environment:
      - TZ=Asia/Seoul
      - SERVICE_NAME=pa-service
      - SERVER_PORT=8082
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=localpkd
      - DB_USER=pkd
      - DB_PASSWORD=${DB_PASSWORD}
      - LDAP_HOST=192.168.100.10
      - LDAP_PORT=389
      - LDAP_BIND_DN=cn=admin,dc=ldap,dc=smartcoreinc,dc=com
      - LDAP_BIND_PASSWORD=${LDAP_BIND_PASSWORD}
      - LDAP_BASE_DN=dc=pkd,dc=ldap,dc=smartcoreinc,dc=com
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./data/pa-logs:/app/logs
    networks:
      - pkd-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ---------------------------------------------------------------------------
  # PKD Relay Service (DB-LDAP Synchronization & Reconciliation)
  # ---------------------------------------------------------------------------
  pkd-relay:
    image: icao-local-pkd-relay:arm64  # CI: pkd-relay-arm64.tar.gz
    container_name: icao-local-pkd-relay
    platform: linux/arm64
    ports:
      - "8083:8083"
    environment:
      - TZ=Asia/Seoul
      - SERVICE_NAME=pkd-relay
      - SERVER_PORT=8083
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=localpkd
      - DB_USER=pkd
      - DB_PASSWORD=${DB_PASSWORD}
      - LDAP_HOST=192.168.100.10
      - LDAP_PORT=389
      - LDAP_WRITE_HOST=192.168.100.10
      - LDAP_WRITE_PORT=389
      - LDAP_BIND_DN=cn=admin,dc=ldap,dc=smartcoreinc,dc=com
      - LDAP_BIND_PASSWORD=${LDAP_BIND_PASSWORD}
      - LDAP_BASE_DN=dc=pkd,dc=ldap,dc=smartcoreinc,dc=com
      - SYNC_INTERVAL_MINUTES=5
      - AUTO_RECONCILE=true
      - MAX_RECONCILE_BATCH_SIZE=100
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./data/sync-logs:/app/logs
    networks:
      - pkd-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/api/sync/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ---------------------------------------------------------------------------
  # Monitoring Service (System Metrics, Service Health)
  # ---------------------------------------------------------------------------
  monitoring-service:
    image: icao-local-monitoring:arm64  # CI: monitoring-service-arm64.tar.gz
    container_name: icao-local-pkd-monitoring
    platform: linux/arm64
    ports:
      - "8084:8084"
    environment:
      - TZ=Asia/Seoul
      - SERVICE_NAME=monitoring-service
      - SERVER_PORT=8084
      - THREAD_NUM=4
      - SYSTEM_METRICS_INTERVAL=5
      - SERVICE_HEALTH_INTERVAL=30
      - SERVICE_PKD_MANAGEMENT=http://pkd-management:8081/api/health
      - SERVICE_PA_SERVICE=http://pa-service:8082/api/health
      - SERVICE_SYNC_SERVICE=http://pkd-relay:8083/api/sync/health
      - NGINX_STATUS_URL=http://api-gateway:8080/nginx_status
      - COLLECTION_INTERVAL=10
      - METRICS_ENDPOINT_AI_ANALYSIS=http://ai-analysis:8085/api/ai/internal/metrics
    depends_on:
      pkd-management:
        condition: service_healthy
      pa-service:
        condition: service_healthy
      pkd-relay:
        condition: service_healthy
    volumes:
      - ./data/monitoring-logs:/app/logs
    networks:
      - pkd-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/api/monitoring/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ---------------------------------------------------------------------------
  # AI Analysis Service (ML-based Certificate Anomaly Detection)
  # ---------------------------------------------------------------------------
  ai-analysis:
    image: icao-local-ai-analysis:arm64  # CI: ai-analysis-arm64.tar.gz
    container_name: icao-local-pkd-ai-analysis
    platform: linux/arm64
    ports:
      - "8085:8085"
    environment:
      - TZ=Asia/Seoul
      - SERVICE_NAME=ai-analysis
      - SERVER_PORT=8085
      - DB_TYPE=postgres
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=localpkd
      - DB_USER=pkd
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_POOL_SIZE=5
      - DB_POOL_OVERFLOW=10
      # MUST be 1: _job_status is in-memory per-process, multi-worker causes status poll to miss COMPLETED
      - UVICORN_WORKERS=1
      - ANALYSIS_SCHEDULE_HOUR=3
      - ANALYSIS_ENABLED=true
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./data/ai-analysis-logs:/app/logs
    networks:
      - pkd-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/api/ai/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ---------------------------------------------------------------------------
  # PostgreSQL Database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: icao-local-pkd-postgres
    platform: linux/arm64
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=pkd
      - POSTGRES_PASSWORD=pkd
      - POSTGRES_DB=localpkd
      - TZ=Asia/Seoul
      - PGTZ=Asia/Seoul
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
    networks:
      - pkd-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pkd -d localpkd"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

# =============================================================================
# Networks
# =============================================================================
networks:
  pkd-network:
    driver: bridge
