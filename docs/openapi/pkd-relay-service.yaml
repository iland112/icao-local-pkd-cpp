openapi: 3.0.3
info:
  title: PKD Relay Service API
  description: |
    DB-LDAP Synchronization and Certificate Re-validation Service API.
    Monitors synchronization between PostgreSQL/Oracle and OpenLDAP,
    performs auto-reconciliation, and certificate expiration re-validation.

    ## Changelog
    - **v2.30.0** (2026-03-09): SSE heartbeat 30초 간격 추가 (HTTP/2 유휴 연결 에러 방지), 프론트엔드 SSE 재연결 최대 20회 제한
    - **v2.29.1** (2026-03-05): SSE HTTP/2 호환성 수정, 알림 스트림 chunked_transfer_encoding off
    - **v2.29.0** (2026-03-05): 실시간 알림 시스템 (SSE Notification stream), 3단계 DSC 재검증 (만료+Trust Chain+CRL), revalidation-history 확장
    - **v2.25.5** (2026-03-01): Sync statistics + Reconciliation statistics endpoints 추가
    - **v2.0.0** (2026-02-06): Oracle + PostgreSQL multi-DBMS support, UUID primary keys
    - **v1.6.0** (2026-01-14): Auto Reconcile feature complete (Phase 1-6)
    - **v1.2.0** (2026-01-07): Remove interval sync, keep only daily scheduler
    - **v1.1.0** (2026-01-06): Daily scheduler, certificate re-validation
    - **v1.0.0** (2026-01-03): Initial release
  version: 2.30.0
  contact:
    name: SmartCore Inc.
    email: support@smartcoreinc.com

servers:
  - url: http://localhost:8083
    description: Development server (direct)
  - url: http://localhost:8080
    description: API Gateway (prefix /api/sync)

tags:
  - name: Health
    description: Health check endpoints
  - name: Sync
    description: DB-LDAP synchronization status and control
  - name: Reconcile
    description: Auto reconciliation (missing LDAP entries)
  - name: Revalidation
    description: Certificate trust chain re-validation
  - name: Notifications
    description: Real-time SSE notification stream
  - name: Config
    description: Service configuration

paths:
  # ============================================
  # Health
  # ============================================
  /api/sync/health:
    get:
      tags: [Health]
      summary: Service health check
      operationId: getHealth
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  # ============================================
  # Sync Status
  # ============================================
  /api/sync/status:
    get:
      tags: [Sync]
      summary: Get DB-LDAP sync status
      description: Returns current sync status with DB and LDAP counts by certificate type.
      operationId: getSyncStatus
      responses:
        '200':
          description: Sync status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncStatusResponse'

  /api/sync/history:
    get:
      tags: [Sync]
      summary: Get sync history
      operationId: getSyncHistory
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: Sync history

  /api/sync/check:
    post:
      tags: [Sync]
      summary: Trigger manual sync check
      description: Immediately check for discrepancies between DB and LDAP.
      operationId: triggerSyncCheck
      responses:
        '200':
          description: Check result

  /api/sync/stats:
    get:
      tags: [Sync]
      summary: Get sync statistics
      description: |
        Returns overall sync statistics including total syncs, success/failure counts,
        DB and LDAP certificate counts by type, and discrepancy summary.
      operationId: getSyncStats
      responses:
        '200':
          description: Sync statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncStatsResponse'

  /api/sync/discrepancies:
    get:
      tags: [Sync]
      summary: Get current discrepancies
      description: Returns list of entities that are in DB but not in LDAP.
      operationId: getDiscrepancies
      responses:
        '200':
          description: Discrepancy list

  # ============================================
  # Reconciliation
  # ============================================
  /api/sync/reconcile:
    post:
      tags: [Reconcile]
      summary: Trigger reconciliation
      description: |
        Add missing entities to LDAP (stored_in_ldap=FALSE → LDAP add → TRUE).
        Scope: CSCA, DSC, CRL (DSC_NC excluded - ICAO deprecated nc-data in 2021).
        Supports dryRun mode.
      operationId: triggerReconciliation
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                dryRun:
                  type: boolean
                  default: false
                  description: Preview only, do not modify LDAP
      responses:
        '200':
          description: Reconciliation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReconciliationResult'

  /api/sync/reconcile/history:
    get:
      tags: [Reconcile]
      summary: Get reconciliation history
      operationId: getReconcileHistory
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Reconciliation history

  /api/sync/reconcile/{id}:
    get:
      tags: [Reconcile]
      summary: Get reconciliation detail
      operationId: getReconcileDetail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Reconciliation detail with individual logs
        '404':
          description: Not found

  /api/sync/reconcile/stats:
    get:
      tags: [Reconcile]
      summary: Get reconciliation statistics
      description: |
        Returns overall reconciliation statistics including total runs,
        success/failure counts, processed/successful/failed totals, and
        per-type breakdown (CSCA, MLSC, DSC, DSC_NC, CRL).
      operationId: getReconcileStats
      responses:
        '200':
          description: Reconciliation statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReconciliationStatsResponse'

  # ============================================
  # Revalidation
  # ============================================
  /api/sync/revalidate:
    post:
      tags: [Revalidation]
      summary: Trigger 3-step certificate re-validation
      description: |
        3단계 인증서 재검증:
        1. **만료 상태 검사**: 인증서 유효기간 확인 후 상태 업데이트 (VALID ↔ EXPIRED_VALID)
        2. **Trust Chain 재검증**: PENDING 상태 DSC의 CSCA 서명 재검증
        3. **CRL 재확인**: 인증서 폐기 상태 재확인
      operationId: triggerRevalidation
      responses:
        '200':
          description: Revalidation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RevalidationResult'
        '500':
          description: Revalidation failed

  /api/sync/revalidation-history:
    get:
      tags: [Revalidation]
      summary: Get revalidation history
      operationId: getRevalidationHistory
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: Revalidation history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RevalidationHistoryItem'

  # ============================================
  # Notifications (SSE)
  # ============================================
  /api/sync/notifications/stream:
    get:
      tags: [Notifications]
      summary: SSE notification stream
      description: |
        Server-Sent Events 스트림으로 실시간 시스템 알림을 수신한다.
        연결 즉시 `connected` 이벤트를 수신하며, 이후 백그라운드 작업 완료 시
        `notification` 이벤트가 브로드캐스트된다.

        ### 이벤트 타입
        | event | type 필드 | 발생 시점 |
        |-------|-----------|----------|
        | `connected` | — | SSE 연결 성공 |
        | `notification` | `SYNC_CHECK_COMPLETE` | DB-LDAP 동기화 검사 완료 |
        | `notification` | `REVALIDATION_COMPLETE` | 인증서 재검증 완료 |
        | `notification` | `RECONCILE_COMPLETE` | Reconciliation 완료 |
        | `notification` | `DAILY_SYNC_COMPLETE` | 일일 동기화 전체 완료 |

        ### 사용 예시
        ```javascript
        const es = new EventSource('/api/sync/notifications/stream');
        es.addEventListener('notification', (e) => {
          const data = JSON.parse(e.data);
          console.log(data.type, data.title, data.message);
        });
        ```
      operationId: getNotificationStream
      responses:
        '200':
          description: SSE stream established
          content:
            text/event-stream:
              schema:
                type: string
                description: |
                  SSE 형식 스트림. 각 이벤트는 다음 포맷:
                  ```
                  event: notification
                  data: {"type":"REVALIDATION_COMPLETE","title":"인증서 재검증 완료","message":"30,549건 처리됨","timestamp":"2026-03-05T17:00:00","data":{...}}
                  ```

  # ============================================
  # Configuration & Scheduler
  # ============================================
  /api/sync/config:
    get:
      tags: [Config]
      summary: Get service configuration
      operationId: getConfig
      responses:
        '200':
          description: Current configuration
    put:
      tags: [Config]
      summary: Update service configuration
      operationId: updateConfig
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Configuration updated

  /api/sync/trigger-daily:
    post:
      tags: [Config]
      summary: Trigger daily scheduler
      description: Manually trigger the daily sync + revalidation job.
      operationId: triggerDaily
      responses:
        '200':
          description: Daily job triggered

components:
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: UP
        service:
          type: string
          example: pkd-relay
        version:
          type: string
        timestamp:
          type: string

    SyncStatusResponse:
      type: object
      properties:
        status:
          type: string
          enum: [IN_SYNC, OUT_OF_SYNC, UNKNOWN]
        databaseCount:
          type: integer
        ldapCount:
          type: integer
        lastChecked:
          type: string
          format: date-time
        byType:
          type: object
          properties:
            CSCA:
              type: object
              properties:
                db:
                  type: integer
                ldap:
                  type: integer
            DSC:
              type: object
              properties:
                db:
                  type: integer
                ldap:
                  type: integer
            CRL:
              type: object
              properties:
                db:
                  type: integer
                ldap:
                  type: integer

    SyncStatsResponse:
      type: object
      properties:
        success:
          type: boolean
        totalSyncs:
          type: integer
        successfulSyncs:
          type: integer
        failedSyncs:
          type: integer
        lastSyncTime:
          type: string
          format: date-time
        averageSyncDuration:
          type: integer
          description: Average sync duration in milliseconds
        dbCounts:
          type: object
          properties:
            csca:
              type: integer
            mlsc:
              type: integer
            dsc:
              type: integer
            dsc_nc:
              type: integer
            crl:
              type: integer
        ldapCounts:
          type: object
          properties:
            csca:
              type: integer
            mlsc:
              type: integer
            dsc:
              type: integer
            dsc_nc:
              type: integer
            crl:
              type: integer
        discrepancies:
          type: object
          properties:
            missing_in_ldap:
              type: integer
            missing_in_db:
              type: integer

    ReconciliationStatsResponse:
      type: object
      properties:
        success:
          type: boolean
        totalReconciliations:
          type: integer
        successfulReconciliations:
          type: integer
        failedReconciliations:
          type: integer
        totalProcessed:
          type: integer
        totalSuccessful:
          type: integer
        totalFailed:
          type: integer
        lastReconciliationTime:
          type: string
          format: date-time
        averageDurationMs:
          type: integer
        byType:
          type: object
          description: Per certificate type breakdown
          additionalProperties:
            type: object
            properties:
              added:
                type: integer
              deleted:
                type: integer

    ReconciliationResult:
      type: object
      properties:
        success:
          type: boolean
        summaryId:
          type: string
          format: uuid
        dryRun:
          type: boolean
        totalMissing:
          type: integer
        totalAdded:
          type: integer
        totalFailed:
          type: integer
        byType:
          type: object
          additionalProperties:
            type: object
            properties:
              missing:
                type: integer
              added:
                type: integer
              failed:
                type: integer

    RevalidationResult:
      type: object
      description: 3단계 재검증 결과
      properties:
        success:
          type: boolean
        totalProcessed:
          type: integer
          description: Step 1 — 만료 검사 대상 인증서 수
        newlyExpired:
          type: integer
          description: Step 1 — 새로 만료된 인증서 수
        newlyValid:
          type: integer
          description: Step 1 — 새로 유효해진 인증서 수
        unchanged:
          type: integer
          description: Step 1 — 변경 없는 인증서 수
        errors:
          type: integer
          description: Step 1 — 처리 오류 수
        durationMs:
          type: integer
          description: 전체 재검증 소요 시간 (ms)
        tcProcessed:
          type: integer
          description: Step 2 — Trust Chain 재검증 대상 수
        tcNewlyValid:
          type: integer
          description: Step 2 — 새로 검증 성공한 수
        tcStillPending:
          type: integer
          description: Step 2 — 여전히 PENDING인 수
        tcErrors:
          type: integer
          description: Step 2 — Trust Chain 검증 오류 수
        crlChecked:
          type: integer
          description: Step 3 — CRL 확인 대상 수
        crlRevoked:
          type: integer
          description: Step 3 — 폐기된 인증서 수
        crlUnavailable:
          type: integer
          description: Step 3 — CRL 조회 불가 수
        crlExpired:
          type: integer
          description: Step 3 — CRL 만료 수
        crlErrors:
          type: integer
          description: Step 3 — CRL 확인 오류 수

    RevalidationHistoryItem:
      type: object
      properties:
        id:
          type: integer
        executedAt:
          type: string
          format: date-time
        totalProcessed:
          type: integer
        newlyExpired:
          type: integer
        newlyValid:
          type: integer
        unchanged:
          type: integer
        errors:
          type: integer
        durationMs:
          type: integer
        tcProcessed:
          type: integer
        tcNewlyValid:
          type: integer
        tcStillPending:
          type: integer
        tcErrors:
          type: integer
        crlChecked:
          type: integer
        crlRevoked:
          type: integer
        crlUnavailable:
          type: integer
        crlExpired:
          type: integer
        crlErrors:
          type: integer

    NotificationEvent:
      type: object
      description: SSE 알림 이벤트 데이터
      properties:
        type:
          type: string
          enum: [SYNC_CHECK_COMPLETE, REVALIDATION_COMPLETE, RECONCILE_COMPLETE, DAILY_SYNC_COMPLETE]
        title:
          type: string
          example: 인증서 재검증 완료
        message:
          type: string
          example: 30,549건 처리됨
        timestamp:
          type: string
          format: date-time
        data:
          type: object
          description: 이벤트 타입별 상세 데이터
